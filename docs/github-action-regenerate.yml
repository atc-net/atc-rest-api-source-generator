# GitHub Action: Auto-regenerate TypeScript client on OpenAPI spec changes
#
# Usage: Copy this file to .github/workflows/regenerate-client.yml in your repository.
# Triggers when OpenAPI spec files change, regenerates the TypeScript client, and opens a PR.
#
# Prerequisites:
#   - atc-rest-api-gen CLI installed as a dotnet tool
#   - Node.js for tsc verification (optional)

name: Regenerate TypeScript Client

on:
  push:
    branches: [main]
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.atc-rest-api-client'
      - '.atc-rest-api-client.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install atc-rest-api-gen CLI
        run: dotnet tool install -g atc-rest-api-gen

      - name: Regenerate TypeScript client
        run: |
          atc-rest-api-gen generate client-typescript \
            -s ${{ vars.OPENAPI_SPEC_PATH || 'api.yaml' }} \
            -o ${{ vars.TS_CLIENT_OUTPUT_PATH || 'src/api' }} \
            --hooks ${{ vars.TS_HOOKS_STYLE || 'ReactQuery' }} \
            --report

      - name: Verify TypeScript compilation (optional)
        if: hashFiles('src/api/tsconfig.json') != ''
        run: |
          npm install --no-save typescript
          npx tsc --noEmit -p src/api/tsconfig.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: regenerate TypeScript client from OpenAPI spec'
          title: 'chore: regenerate TypeScript client'
          body: |
            Auto-generated by the `regenerate-client` workflow.

            The OpenAPI specification was updated and the TypeScript client has been regenerated.

            **Changes:**
            - Updated models, enums, and client classes
            - See `.generation-report.md` for details
          branch: chore/regenerate-ts-client
          delete-branch: true
          labels: automated,typescript
